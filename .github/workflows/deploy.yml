name: Deploy to VPS

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # O runner não tem o .env (gitignored). "build"/"push" nunca usam essa env var de fato
      # (só o "up" na VPS, com o .env real, usa pra valer) — mas o compose interpola o arquivo
      # inteiro antes de saber qual comando/serviço foi pedido, então precisa de algum valor
      # aqui só pra não falhar o parse.
      ASPIRE_OTLP_APIKEY: unused-in-ci-build

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker compose build webapp

      - name: Push image
        run: docker compose push webapp

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/broeringvictor/financeiro-blazor-webapp:latest
            cd /opt/financeiro
            docker compose up -d --remove-orphans
            docker image prune -f
