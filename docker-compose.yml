services:
  webapp:
    image: ghcr.io/broeringvictor/financeiro-blazor-webapp:latest
    build:
      context: .
      dockerfile: src/WebApp/WebApp/Dockerfile
    restart: unless-stopped
    env_file:
      # Opcional: só existe na VPS (onde o compose faz "up"). No runner do CI, "build"/"push" nem
      # precisam dele — sem "required: false" o compose falha só de não achar o arquivo.
      - path: .env
        required: false
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/app.db
      # Chaves de Data Protection no volume persistente: sem isso, cada redeploy invalida os
      # cookies de login e tokens antiforgery já emitidos (erro ao desserializar o token).
      - DataProtection__KeysDirectory=/app/data/keys
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_SERVICE_NAME=webapp
      # Sem isso, o dashboard aceitaria telemetria de qualquer app não autenticado (ver
      # https://aspire.dev/dashboard/security-considerations/#secure-api-endpoints).
      - OTEL_EXPORTER_OTLP_HEADERS=x-otlp-api-key=${ASPIRE_OTLP_APIKEY:?defina ASPIRE_OTLP_APIKEY no .env}
      # Alerta de vencimentos por WhatsApp: fala com a Evolution pela rede interna (nunca exposta).
      # ApiKey = mesmo segredo do AUTHENTICATION_API_KEY da Evolution (a "senha compartilhada").
      - Evolution__BaseUrl=http://evolution-api:8080
      - Evolution__ApiKey=${EVOLUTION_API_KEY:?defina EVOLUTION_API_KEY no .env}
      - Evolution__Instance=${EVOLUTION_INSTANCE:-financeiro}
      - Evolution__RecipientNumber=${EVOLUTION_RECIPIENT_NUMBER:?defina EVOLUTION_RECIPIENT_NUMBER no .env}
    volumes:
      - webapp-data:/app/data
    networks:
      - internal
    ports:
      # Caddy roda no host (systemd, não container) e faz reverse_proxy pra localhost:8081 —
      # mesmo padrão do portfólio (que usa a 8080). Só loopback: não expõe fora do host.
      - "127.0.0.1:8081:8080"

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    restart: unless-stopped
    environment:
      - DASHBOARD__FRONTEND__AUTHMODE=BrowserToken
      - DASHBOARD__OTLP__AUTHMODE=ApiKey
      - DASHBOARD__OTLP__PRIMARYAPIKEY=${ASPIRE_OTLP_APIKEY:?defina ASPIRE_OTLP_APIKEY no .env}
    ports:
      # Só em loopback: acesse via túnel SSH (ssh -L 18888:localhost:18888 seu-vps), nunca exposto direto.
      - "127.0.0.1:18888:18888"
    networks:
      - internal

  # WhatsApp: Evolution API v2 + Postgres e Redis dedicados (não reaproveita o SQLite do webapp).
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    depends_on:
      evolution-postgres:
        condition: service_healthy
    environment:
      # URL pública por onde a Evolution monta links de mídia/webhook. Ajuste pro domínio real
      # servido pelo Caddy (ex.: https://evolution.seudominio.com).
      - SERVER_URL=${EVOLUTION_SERVER_URL:?defina EVOLUTION_SERVER_URL no .env}
      # Chave mestra da API (header "apikey"). Gere algo aleatório, ex.: openssl rand -hex 32.
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:?defina EVOLUTION_API_KEY no .env}
      # Persistência no Postgres (sem isso, instâncias/sessões se perdem no redeploy).
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD:?defina EVOLUTION_POSTGRES_PASSWORD no .env}@evolution-postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      # 1 usuário, envio simples: cache local basta (sem Redis, menos peças pra manter).
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
    volumes:
      - evolution-instances:/evolution/instances
    networks:
      - internal
    ports:
      # Só loopback: o Caddy do host faz reverse_proxy pra localhost:8082 (mesmo padrão do webapp).
      - "127.0.0.1:8082:8080"

  evolution-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${EVOLUTION_POSTGRES_PASSWORD:?defina EVOLUTION_POSTGRES_PASSWORD no .env}
      - POSTGRES_DB=evolution
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  webapp-data:
  evolution-instances:
  evolution-postgres-data:

networks:
  internal:
