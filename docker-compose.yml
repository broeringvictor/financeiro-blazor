services:
  webapp:
    build:
      context: .
      dockerfile: src/WebApp/WebApp/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/app.db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_SERVICE_NAME=webapp
    volumes:
      - webapp-data:/app/data
    networks:
      - internal
      - proxy
    # Não publica porta pro host: quem fala com o container é o nginx, pela rede "proxy".

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    restart: unless-stopped
    environment:
      - DASHBOARD__FRONTEND__AUTHMODE=BrowserToken
    ports:
      # Só em loopback: acesse via túnel SSH (ssh -L 18888:localhost:18888 seu-vps), nunca exposto direto.
      - "127.0.0.1:18888:18888"
    networks:
      - internal

volumes:
  webapp-data:

networks:
  internal:
  # Rede onde o nginx (ou Nginx Proxy Manager) já roda no VPS — ajuste o nome para o que já existe
  # no seu compose atual (ex.: "npm_default"). Se preferir, junte este arquivo ao compose existente
  # em vez de mantê-lo separado, e remova esta rede "external".
  proxy:
    external: true
    name: proxy
