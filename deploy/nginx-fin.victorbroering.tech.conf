# Vhost para o subdomínio, caso o VPS use nginx "puro" (fora de um proxy manager com UI).
# Ajuste os caminhos de certificado conforme onde o certbot os gerar.
# Coloque em /etc/nginx/sites-available/ e link em sites-enabled/, ou no diretório de confs do seu setup.
#
# Pressupõe que este nginx roda como container na mesma rede Docker "proxy" (proxy_pass usa o
# nome do serviço "webapp"). Se o seu nginx roda direto no host (fora de container), troque
# "webapp:8080" por "127.0.0.1:PORTA" e publique a porta do container webapp pro host no compose.

server {
    listen 80;
    listen [::]:80;
    server_name fin.victorbroering.tech;

    # Necessário para o certbot emitir/renovar o certificado (modo webroot ou plugin nginx).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fin.victorbroering.tech;

    ssl_certificate     /etc/letsencrypt/live/fin.victorbroering.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fin.victorbroering.tech/privkey.pem;

    location / {
        # "webapp" = nome do serviço no docker-compose.yml, resolvido via a rede "proxy" compartilhada.
        proxy_pass http://webapp:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necessário para o Blazor Server (WebSocket do circuito interativo).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 100s;
    }
}
